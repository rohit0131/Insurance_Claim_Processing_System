<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Approval List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<h2>Claim Approval List</h2>

<a href="/ui/approval/create" class="btn btn-primary mb-3">
    + Approve Claim
</a>

<table class="table table-bordered table-hover">

    <thead class="table-dark">
    <tr>
        <th>ID</th>
        <th>Status</th>
        <th>Comments</th>
        <th>Approval Date</th>
        <th>Claim ID</th>
        <th>Admin ID</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="a : ${approvals}">
        <td th:text="${a.approvalId}"></td>
        <td th:text="${a.status}"></td>
        <td th:text="${a.comments}"></td>
        <td th:text="${a.approvalDate}"></td>
        <td th:text="${a.claimId}"></td>
        <td th:text="${a.adminId}"></td>
    </tr>
    </tbody>

</table>

</body>
</html>
