<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Customers</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<h2 class="mb-3">Customer List</h2>

<a href="/ui/customer/create" class="btn btn-primary mb-3">+ Add Customer</a>

<table class="table table-bordered table-hover">

    <thead class="table-dark">
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Phone</th>
        <th>Address</th>
        <th>Actions</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="c : ${customers}">
        <td th:text="${c.customerId}"></td>
        <td th:text="${c.name}"></td>
        <td th:text="${c.email}"></td>
        <td th:text="${c.phone}"></td>
        <td th:text="${c.address}"></td>

        <td>
            <a th:href="@{'/ui/customer/edit/' + ${c.customerId}}"
               class="btn btn-warning btn-sm">Edit</a>

            <a th:href="@{'/ui/customer/delete/' + ${c.customerId}}"
               class="btn btn-danger btn-sm"
               onclick="return confirm('Are you sure?')">Delete</a>
        </td>
    </tr>
    </tbody>

</table>

</body>
</html>
