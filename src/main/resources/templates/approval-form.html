<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Approval Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<h2>Approve Claim</h2>

<form th:action="@{/ui/approval/save}" th:object="${approval}" method="post">

    <input type="hidden" th:field="*{approvalId}"/>

    <div class="mb-3">
        <label>Status</label>
        <input type="text" th:field="*{status}" class="form-control" placeholder="APPROVED / REJECTED" required>
    </div>

    <div class="mb-3">
        <label>Comments</label>
        <input type="text" th:field="*{comments}" class="form-control">
    </div>

    <div class="mb-3">
        <label>Approval Date</label>
        <input type="datetime-local" th:field="*{approvalDate}" class="form-control" required>
    </div>

    <div class="mb-3">
        <label>Claim ID</label>
        <input type="number" th:field="*{claimId}" class="form-control" required>
    </div>

    <div class="mb-3">
        <label>Admin ID</label>
        <input type="number" th:field="*{adminId}" class="form-control" required>
    </div>

    <button class="btn btn-success">Submit Approval</button>

</form>

</body>
</html>
