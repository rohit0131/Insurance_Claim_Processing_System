<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Claim Status</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<h2>Claim Status List</h2>

<a href="/ui/status/create" class="btn btn-primary mb-3">+ Add Status</a>

<table class="table table-bordered table-hover">

    <thead class="table-dark">
    <tr>
        <th>ID</th>
        <th>Status</th>
        <th>Remarks</th>
        <th>Actions</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="s : ${statuses}">
        <td th:text="${s.statusId}"></td>
        <td th:text="${s.status}"></td>
        <td th:text="${s.remarks}"></td>

        <td>
            <a th:href="@{'/ui/status/edit/' + ${s.statusId}}"
               class="btn btn-warning btn-sm">Edit</a>

            <a th:href="@{'/ui/status/delete/' + ${s.statusId}}"
               class="btn btn-danger btn-sm"
               onclick="return confirm('Are you sure?')">Delete</a>
        </td>
    </tr>
    </tbody>

</table>

</body>
</html>
