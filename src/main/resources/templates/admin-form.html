<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<h2>Admin Form</h2>

<form th:action="@{/ui/admin/save}" th:object="${admin}" method="post">

    <input type="hidden" th:field="*{adminId}"/>

    <div class="mb-3">
        <label>Name</label>
        <input type="text" th:field="*{adminName}" class="form-control" required>
    </div>

    <div class="mb-3">
        <label>Email</label>
        <input type="email" th:field="*{email}" class="form-control" required>
    </div>

    <div class="mb-3">
        <label>Password</label>
        <input type="password" th:field="*{password}" class="form-control" required>
    </div>

    <div class="mb-3">
        <label>Role</label>
        <input type="text" th:field="*{role}" class="form-control">
    </div>

    <button class="btn btn-success">Save Admin</button>

</form>

</body>
</html>
