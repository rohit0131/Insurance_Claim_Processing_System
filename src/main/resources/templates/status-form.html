<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Status Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<h2>Claim Status Form</h2>

<form th:action="@{/ui/status/save}" th:object="${status}" method="post">

    <input type="hidden" th:field="*{statusId}"/>

    <div class="mb-3">
        <label>Status</label>
        <input type="text" th:field="*{status}" class="form-control" required>
    </div>

    <div class="mb-3">
        <label>Remarks</label>
        <input type="text" th:field="*{remarks}" class="form-control">
    </div>

    <button class="btn btn-success">Save Status</button>

</form>

</body>
</html>
