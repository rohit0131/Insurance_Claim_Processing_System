<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Policies</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<h2>Policy List</h2>

<a href="/ui/policy/create" class="btn btn-primary mb-3">+ Add Policy</a>

<table class="table table-bordered table-hover">

    <thead>
    <tr>
        <th>ID</th>
        <th>Policy No</th>
        <th>Type</th>
        <th>Premium</th>
        <th>Start Date</th>
        <th>End Date</th>
        <th>Action</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="p : ${policies}">
        <td th:text="${p.policyId}"></td>
        <td th:text="${p.policyNo}"></td>
        <td th:text="${p.policyType}"></td>
        <td th:text="${p.premiumAmount}"></td>
        <td th:text="${p.startDate}"></td>
        <td th:text="${p.endDate}"></td>

        <td>
            <a th:href="@{'/ui/policy/delete/' + ${p.policyId}}"
               class="btn btn-danger btn-sm">Delete</a>
        </td>
    </tr>
    </tbody>

</table>

</body>
</html>
