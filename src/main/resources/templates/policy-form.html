<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create Policy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<h2>Create Policy</h2>

<form th:action="@{/ui/policy/save}" th:object="${policy}" method="post">

    <div class="mb-3">
        <label>Policy No</label>
        <input type="text" th:field="*{policyNo}" class="form-control">
    </div>

    <div class="mb-3">
        <label>Policy Type</label>
        <input type="text" th:field="*{policyType}" class="form-control">
    </div>

    <div class="mb-3">
        <label>Premium Amount</label>
        <input type="number" th:field="*{premiumAmount}" class="form-control">
    </div>

    <div class="mb-3">
        <label>Start Date</label>
        <input type="date" th:field="*{startDate}" class="form-control">
    </div>

    <div class="mb-3">
        <label>End Date</label>
        <input type="date" th:field="*{endDate}" class="form-control">
    </div>

    <button class="btn btn-success">Save</button>

</form>

</body>
</html>
