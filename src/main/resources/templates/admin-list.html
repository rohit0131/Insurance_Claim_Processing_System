<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<h2>Admin List</h2>

<a href="/ui/admin/create" class="btn btn-primary mb-3">+ Add Admin</a>

<table class="table table-bordered table-hover">

    <thead class="table-dark">
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Role</th>
        <th>Actions</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="a : ${admins}">
        <td th:text="${a.adminId}"></td>
        <td th:text="${a.adminName}"></td>
        <td th:text="${a.email}"></td>
        <td th:text="${a.role}"></td>

        <td>
            <a th:href="@{'/ui/admin/edit/' + ${a.adminId}}"
               class="btn btn-warning btn-sm">Edit</a>

            <a th:href="@{'/ui/admin/delete/' + ${a.adminId}}"
               class="btn btn-danger btn-sm"
               onclick="return confirm('Are you sure?')">Delete</a>
        </td>
    </tr>
    </tbody>

</table>

</body>
</html>
