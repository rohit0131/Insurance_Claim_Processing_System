<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create Claim</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<h2>Create Claim</h2>

<form th:action="@{/ui/claim/save}" th:object="${claim}" method="post">

    <div class="mb-3">
        <label>Claim Amount</label>
        <input type="number" th:field="*{claimAmount}" class="form-control">
    </div>

    <div class="mb-3">
        <label>Claim Date</label>
        <input type="date" th:field="*{claimDate}" class="form-control">
    </div>

    <div class="mb-3">
        <label>Description</label>
        <input type="text" th:field="*{description}" class="form-control">
    </div>

    <div class="mb-3">
        <label>Status</label>
        <input type="text" th:field="*{status}" class="form-control">
    </div>

    <div class="mb-3">
        <label>Policy ID</label>
        <input type="number" th:field="*{policyId}" class="form-control">
    </div>

    <button class="btn btn-success">Submit Claim</button>

</form>

</body>
</html>
